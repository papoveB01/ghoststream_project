# Automated dependency update PRs (SOC 2 CC7.1 — vulnerability management).
version: 2
updates:
  - package-ecosystem: npm
    directory: /api
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      # Batch routine updates into one PR; security updates still come separately.
      minor-and-patch:
        update-types: ['minor', 'patch']
  - package-ecosystem: npm
    directory: /mcp
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
