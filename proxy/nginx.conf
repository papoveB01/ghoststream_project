resolver 127.0.0.11 valid=10s ipv6=off;

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Match host-level ceiling. Knowledge Base PDF uploads can hit 50-80MB
    # for full product manuals; the host nginx vhost must also have
    # client_max_body_size 100m set or it returns 413 before this layer.
    client_max_body_size 100m;
    client_body_timeout 300s;

    # Static asset caching.
    # JS/CSS use must-revalidate so iterating on UI doesn't require hard-reload
    # — the browser keeps the bytes but issues a conditional GET (cheap 304s
    # against the ETag). Images/fonts get a longer TTL.
    location ~* \.(?:css|js)$ {
        access_log off;
        add_header Cache-Control "public, no-cache, must-revalidate";
        etag on;
        try_files $uri =404;
    }
    location ~* \.(?:svg|png|jpg|jpeg|gif|ico|webp|woff2?)$ {
        expires 1d;
        access_log off;
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    location ~ /\. {
        deny all;
    }
    location ~ \.env$ {
        deny all;
    }

    # Node API (Gemini + business logic)
    location /api/ {
        proxy_pass http://api:3000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 10s;
        # Web-discovery + research endpoints fan out to search/scrape/LLM; allow
        # generous headroom so a slow sweep doesn't 504.
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }

    # Python capture service (Recall.ai / Skribby media streams)
    location /capture/ {
        proxy_pass http://capture:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Inbound webhook from Calendly — handled by the Node API (it creates a
    # mission). Exact-match so it beats the /webhooks/ prefix below.
    #   https://ghoststream.exact-it.net/webhooks/calendly
    location = /webhooks/calendly {
        proxy_pass http://api:3000/webhooks/calendly;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    # Inbound webhooks from Recall.ai / Skribby — handled by the capture service.
    # Configure on the provider dashboard as:
    #   https://ghoststream.exact-it.net/webhooks/recall
    #   https://ghoststream.exact-it.net/webhooks/skribby
    location /webhooks/ {
        proxy_pass http://capture:8000/webhooks/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Preserve raw body for HMAC signature verification
        proxy_request_buffering off;
        proxy_connect_timeout 10s;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }

    location = /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Static landing page
    location / {
        try_files $uri $uri/ /index.html;
    }
}
