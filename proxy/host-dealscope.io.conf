# Host-level nginx vhost for dealscope.io (PRODUCTION) → docker proxy 127.0.0.1:8091
# (the dsp-proxy container; server_name _ inside, host-agnostic). Port-80 form so
# certbot --nginx can attach + add TLS. Install on the HOST (root):
#   sudo mkdir -p /var/www/dealscope.io
#   sudo cp /home/admin/dealscope/proxy/host-dealscope.io.conf /etc/nginx/conf.d/dealscope.io.conf
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d dealscope.io --redirect --agree-tos -m you@eel-global.com -n
# certbot rewrites this block to add `listen 443 ssl` + cert paths + an 80->443
# redirect (same shape as the staging vhost).
#
# To also serve www: add a DNS A record for www.dealscope.io, append
# `www.dealscope.io` to server_name below, and add `-d www.dealscope.io` to certbot.
server {
    listen 80;
    listen [::]:80;
    server_name dealscope.io;

    # KB PDF uploads run 50-80MB; raise the body ceiling above nginx's 1MB default.
    client_max_body_size 100m;
    client_body_timeout 300s;
    send_timeout 300s;

    location ^~ /.well-known/acme-challenge/ {
        allow all;
        default_type "text/plain";
        root /var/www/dealscope.io;
    }

    location ~ /\. { deny all; return 404; }
    location ~ \.env$ { deny all; return 404; }

    location / {
        proxy_pass http://127.0.0.1:8091;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_request_buffering off;
    }
}
