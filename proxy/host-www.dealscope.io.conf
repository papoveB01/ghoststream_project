# Host-level nginx vhost for www.dealscope.io — canonical-domain redirect.
# Apex (dealscope.io) is canonical; www 301s to it. Reuses the dealscope.io
# Let's Encrypt cert AFTER it has been expanded to include the www SAN.
#
# INSTALL (HOST, root) — run in this order:
#   1. Expand the existing cert to cover www (nginx authenticator; does NOT
#      rewrite any vhost — safe for the other production sites on this box):
#        sudo certbot certonly --nginx -d dealscope.io -d www.dealscope.io --expand -n
#   2. Drop in this vhost and reload:
#        sudo cp /home/admin/dealscope/proxy/host-www.dealscope.io.conf /etc/nginx/conf.d/www.dealscope.io.conf
#        sudo nginx -t && sudo systemctl reload nginx
#   3. Verify:  curl -sI https://www.dealscope.io/   ->  301 to https://dealscope.io/

server {
    listen 80;
    listen [::]:80;
    server_name www.dealscope.io;

    location ^~ /.well-known/acme-challenge/ {
        allow all;
        default_type "text/plain";
        root /var/www/dealscope.io;
    }

    location / { return 301 https://dealscope.io$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name www.dealscope.io;

    ssl_certificate /etc/letsencrypt/live/dealscope.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dealscope.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / { return 301 https://dealscope.io$request_uri; }
}
