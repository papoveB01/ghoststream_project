# Host-level nginx vhost for staging.dealscope.io → docker proxy (127.0.0.1:8090).
# Full TLS config — the cert was already issued by certbot
# (/etc/letsencrypt/live/staging.dealscope.io/). Install + reload:
#   sudo mkdir -p /var/www/staging.dealscope.io
#   sudo cp proxy/host-staging.dealscope.io.conf /etc/nginx/conf.d/staging.dealscope.io.conf
#   sudo nginx -t && sudo systemctl reload nginx
# Mirrors the working ghoststream.exact-it.net vhost (proxy target, body limits,
# TLS options). Auto-renewal: the existing certbot timer renews this cert too.
server {
    server_name staging.dealscope.io;

    # KB PDF uploads run 50–80MB; raise the body ceiling above nginx's 1MB default.
    client_max_body_size 100m;
    client_body_timeout 300s;
    send_timeout 300s;

    location ^~ /.well-known/acme-challenge/ {
        allow all;
        default_type "text/plain";
        root /var/www/staging.dealscope.io;
    }

    location ~ /\. { deny all; return 404; }
    location ~ \.env$ { deny all; return 404; }

    location / {
        proxy_pass http://127.0.0.1:8090;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_request_buffering off;
    }

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/staging.dealscope.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.dealscope.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = staging.dealscope.io) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name staging.dealscope.io;
    return 404;
}
