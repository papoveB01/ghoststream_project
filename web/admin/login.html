<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in · DealScope</title>
  <meta name="theme-color" content="#ffffff">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@300;400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/admin/admin.css">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='7' fill='%231e7d45'/%3E%3Ctext x='16' y='22' font-family='sans-serif' font-size='18' font-weight='800' text-anchor='middle' fill='%23ffffff'%3ED%3C/text%3E%3C/svg%3E">
</head>
<body class="login-page">

  <main class="login-wrap">
    <div class="login-card">
      <a class="brand" href="/">
        <span class="brand-mark">
          <svg width="36" height="36" viewBox="0 0 28 28"><rect width="28" height="28" rx="7" fill="#1e7d45"/><path d="M9 14a5 5 0 0110 0v3l2 2H7l2-2v-3z" fill="white"/></svg>
        </span>
        <span class="brand-name">DealScope</span>
      </a>
      <h1>Sign in</h1>
      <p class="lede">Welcome back — sign in to your workspace.</p>

      <form id="login-form">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" autocomplete="username" required placeholder="you@company.com">
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" autocomplete="current-password" required>
        </div>
        <div class="error hidden" id="error"></div>
        <button type="submit" class="primary-cta" id="submit-btn">Sign in</button>
      </form>

      <!-- New-device verification: shown after a correct password on an
           unrecognized device, while #login-form is hidden. -->
      <form id="otp-form" class="hidden">
        <p class="lede" id="otp-lede">We emailed you a 6-digit code.</p>
        <div class="field">
          <label for="otp-code">Verification code</label>
          <input type="text" id="otp-code" name="code" inputmode="numeric" autocomplete="one-time-code"
                 pattern="[0-9]*" maxlength="6" required placeholder="123456">
        </div>
        <label class="otp-trust">
          <input type="checkbox" id="otp-trust" checked>
          <span>Trust this device for 30 days</span>
        </label>
        <div class="error hidden" id="otp-error"></div>
        <button type="submit" class="primary-cta" id="otp-submit-btn">Verify &amp; sign in</button>
        <div class="login-foot">
          <a href="#" id="otp-resend">Resend code</a>
          <span aria-hidden="true"> · </span>
          <a href="#" id="otp-back">Use a different account</a>
        </div>
      </form>

      <div class="login-foot" id="login-foot">
        <span>New to DealScope? <a href="/onboarding/">Create an account</a></span>
        <span aria-hidden="true"> · </span>
        <a href="/">← Back to site</a>
      </div>
    </div>
  </main>

  <script src="/admin/login.js"></script>
</body>
</html>
