<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" font-family="DejaVu Sans, Verdana, sans-serif">
  <rect width="1200" height="630" fill="#12141a"/>
  <!-- subtle top hairline + bottom signal bar -->
  <rect x="0" y="0" width="1200" height="2" fill="#23262e"/>
  <rect x="0" y="624" width="1200" height="6" fill="#c2f24a"/>

  <!-- brand lockup -->
  <g transform="translate(96,120)">
    <rect width="84" height="84" rx="20" fill="#c2f24a"/>
    <text x="42" y="60" text-anchor="middle" font-size="52" font-weight="900" fill="#12141a">D</text>
    <text x="108" y="62" font-size="58" font-weight="800" fill="#f6f6f3">DealScope</text>
  </g>

  <!-- headline -->
  <text x="96" y="320" font-size="76" font-weight="800" fill="#f6f6f3">AI Sales Intelligence</text>
  <text x="96" y="408" font-size="76" font-weight="800" fill="#f6f6f3">&amp; Enablement</text>

  <!-- value line -->
  <text x="98" y="500" font-size="30" font-weight="700" fill="#c2f24a" letter-spacing="0.5">Know your market.  Find your next deal.  Win the call.</text>

  <!-- domain -->
  <text x="98" y="560" font-size="26" font-weight="500" fill="#8a8f99" letter-spacing="1">dealscope.io</text>
</svg>
